<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hexplore by Bibi</title>
<meta name="description" content="Track any Ethereum wallet — see all transactions instantly."/>
<meta property="og:title" content="Hexplore by Bibi"/>
<meta property="og:description" content="Ethereum wallet transaction explorer."/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
[data-theme="dark"]{
  --bg:#080b12;--surf:#0f1320;--surf2:#141927;
  --bdr:#1a2035;--bdr2:#222840;
  --txt:#dde4f5;--txt2:#6b7a99;--txt3:#323d55;
  --blue:#5b8ff9;--blue-bg:rgba(91,143,249,.1);--blue-br:rgba(91,143,249,.2);
  --green:#3ecf8e;--green-bg:rgba(62,207,142,.09);
  --orange:#f5a623;--orng-bg:rgba(245,166,35,.09);
  --red:#f25f5c;--red-bg:rgba(242,95,92,.09);
  --sh:0 2px 8px rgba(0,0,0,.5);--sh2:0 12px 40px rgba(0,0,0,.6);
  --nav-bg:rgba(8,11,18,.96);
}
[data-theme="light"]{
  --bg:#f2f5fc;--surf:#fff;--surf2:#f7f9fe;
  --bdr:#e3e8f4;--bdr2:#ccd4ea;
  --txt:#0d1526;--txt2:#5a6b8a;--txt3:#97a3bc;
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.07);--blue-br:rgba(37,99,235,.2);
  --green:#059669;--green-bg:rgba(5,150,105,.08);
  --orange:#d97706;--orng-bg:rgba(217,119,6,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --sh:0 2px 8px rgba(0,0,0,.06);--sh2:0 12px 40px rgba(0,0,0,.1);
  --nav-bg:rgba(242,245,252,.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;line-height:1.5;transition:background .2s,color .2s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);height:60px;}
.nav-in{max-width:1000px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#5b8ff9,#8247e5);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-wrap{line-height:1.1;}
.logo-name{font-weight:800;font-size:17px;letter-spacing:-.5px;}
.logo-byline{font-size:10px;color:var(--txt3);font-weight:600;}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.eth-badge{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:rgba(98,126,234,.12);border:1px solid rgba(98,126,234,.25);font-size:12px;font-weight:700;color:#627eea;}
.btn-theme{width:34px;height:34px;border:1px solid var(--bdr2);border-radius:8px;background:var(--surf);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:border-color .15s;}
.btn-theme:hover{border-color:var(--blue);}

/* HERO */
.hero{max-width:1000px;margin:0 auto;padding:56px 20px 0;}
.hero-title{font-size:38px;font-weight:800;letter-spacing:-.8px;line-height:1.2;margin-bottom:12px;}
.hero-title span{background:linear-gradient(135deg,#627eea,#5b8ff9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:15px;color:var(--txt2);margin-bottom:32px;font-weight:500;}

/* SEARCH */
.search-box{background:var(--surf);border:1px solid var(--bdr2);border-radius:14px;padding:6px 6px 6px 20px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s;}
.search-box:focus-within{border-color:#627eea;box-shadow:0 0 0 3px rgba(98,126,234,.12);}
.s-inp{flex:1;background:transparent;border:none;outline:none;font-family:'Sora',sans-serif;font-size:14px;color:var(--txt);padding:10px 0;}
.s-inp::placeholder{color:var(--txt3);}
.s-btn{background:linear-gradient(135deg,#627eea,#5b8ff9);color:#fff;border:none;padding:11px 28px;border-radius:9px;font-family:'Sora',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s;white-space:nowrap;flex-shrink:0;}
.s-btn:hover{opacity:.85;}
.s-btn:disabled{opacity:.45;cursor:not-allowed;}

/* WRAP */
.wrap{max-width:1000px;margin:0 auto;padding:28px 20px 60px;}

/* WALLET CARD */
.wallet-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:22px 24px;margin-bottom:18px;box-shadow:var(--sh);}
.wc-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.wc-av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;background:linear-gradient(135deg,#627eea,#5b8ff9);}
.wc-addr{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--txt);word-break:break-all;line-height:1.6;}
.wc-sub{font-size:11px;color:var(--txt2);margin-top:3px;}
.wc-stats{display:flex;gap:0;border-top:1px solid var(--bdr);padding-top:16px;flex-wrap:wrap;}
.wc-stat{padding:0 24px;border-right:1px solid var(--bdr);}
.wc-stat:first-child{padding-left:0;}
.wc-stat:last-child{border-right:none;}
.wc-lbl{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.wc-val{font-weight:800;font-size:22px;letter-spacing:-.5px;}
.c-eth{color:#627eea;} .cg{color:var(--green);} .co{color:var(--orange);}

/* TX TABLE */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;box-shadow:var(--sh);}
.card-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bdr);}
.card-ttl{font-weight:700;font-size:13px;}
.btn-rf{background:transparent;border:1px solid var(--bdr2);color:var(--txt2);font-size:11px;font-weight:600;font-family:'Sora',sans-serif;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;}
.btn-rf:hover{border-color:var(--blue);color:var(--blue);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;padding:9px 16px;background:var(--surf2);border-bottom:1px solid var(--bdr);text-align:left;}
.tbl td{padding:12px 16px;font-size:12px;color:var(--txt2);border-bottom:1px solid var(--bdr);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surf2);cursor:pointer;}
.mono{font-family:'IBM Plex Mono',monospace;font-size:11px;}
.hl{color:var(--blue);}.hl:hover{text-decoration:underline;}
.ar{display:flex;align-items:center;gap:5px;}
.av{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
.at{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--txt);}
.arw{color:var(--txt3);margin:0 3px;font-size:11px;}
.val-in{color:var(--green);font-weight:700;}
.val-out{color:var(--red);font-weight:700;}
.val-self{color:var(--orange);font-weight:700;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'Sora',sans-serif;white-space:nowrap;}
.b-in{background:var(--green-bg);color:var(--green);}
.b-out{background:var(--red-bg);color:var(--red);}
.b-self{background:var(--orng-bg);color:var(--orange);}
.b-ok{background:var(--green-bg);color:var(--green);}
.b-fail{background:var(--red-bg);color:var(--red);}
.loading{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px;}
.loader{display:inline-block;width:22px;height:22px;border:2px solid var(--bdr2);border-top-color:#627eea;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px;line-height:2;}
.view-more{padding:11px 16px;font-size:11px;color:var(--txt3);border-top:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.view-more a{color:var(--blue);font-weight:600;text-decoration:none;}
.view-more a:hover{text-decoration:underline;}

/* PANEL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;}
.ov.show{display:block;}
.panel{position:fixed;top:0;right:0;width:460px;height:100vh;background:var(--surf);border-left:1px solid var(--bdr2);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh2);}
.panel.open{transform:translateX(0);}
.ph{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--surf);z-index:1;}
.ph-ttl{font-weight:700;font-size:14px;}
.btn-x{width:28px;height:28px;border-radius:6px;border:1px solid var(--bdr2);background:transparent;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.btn-x:hover{border-color:var(--red);color:var(--red);}
.pb{padding:20px;}
.dr{padding:12px 0;border-bottom:1px solid var(--bdr);}
.dr:last-child{border-bottom:none;}
.dk{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);margin-bottom:5px;}
.dv{font-size:12px;color:var(--txt);word-break:break-all;line-height:1.6;}
.dv.m{font-family:'IBM Plex Mono',monospace;font-size:11px;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);z-index:999;background:var(--surf);border:1px solid var(--bdr2);border-radius:20px;padding:10px 22px;font-size:13px;color:var(--txt);box-shadow:var(--sh2);max-width:90vw;text-align:center;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.wallet-card,.card{animation:fadeUp .3s ease both;}
@media(max-width:700px){.panel{width:100vw}.tbl th:nth-child(4),.tbl td:nth-child(4){display:none}}
@media(max-width:500px){.hero-title{font-size:26px}.tbl th:nth-child(5),.tbl td:nth-child(5){display:none}.wc-stat{padding:8px 12px 0 0;border-right:none}}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <div class="logo">
      <div class="logo-mark">⬡</div>
      <div class="logo-wrap">
        <div class="logo-name">Hexplore</div>
        <div class="logo-byline">by Bibi</div>
      </div>
    </div>
    <div class="nav-r">
      <div class="eth-badge">
        <span style="font-size:16px">⬡</span> Ethereum
      </div>
      <button class="btn-theme" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-title">Track any wallet on<br><span>Ethereum</span></div>
  <div class="hero-sub">Paste any wallet address and instantly see its full transaction history.</div>
  <div class="search-box">
    <span style="color:var(--txt3);font-size:16px;flex-shrink:0">🔍</span>
    <input class="s-inp" id="searchInput" placeholder="Paste Ethereum wallet address  (0x…)"/>
    <button class="s-btn" id="searchBtn" onclick="doSearch()">Search</button>
  </div>
</div>

<div class="wrap">
  <div id="results" style="display:none">
    <div class="wallet-card" id="walletCard"></div>
    <div class="card" id="txCard">
      <div class="card-hd">
        <span class="card-ttl">Transactions</span>
        <button class="btn-rf" onclick="doSearch()">↻ Refresh</button>
      </div>
      <div id="txBody"><div class="loading"><div class="loader"></div><br>Loading…</div></div>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="ph">
    <span class="ph-ttl">Transaction Details</span>
    <button class="btn-x" onclick="closePanel()">✕</button>
  </div>
  <div class="pb" id="panelBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const KEY  = '7MY5854WUM8TQIVSK9HSC5ZYB5VW356SZD';
const API  = `https://api.etherscan.io/v2/api?chainid=1&apikey=${KEY}`;
const CORS = u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`;

let curAddr = '';
let txCache = [];
let busy    = false;

// ─── THEME ───────────────────────────────────────────────────────────────────
function toggleTheme(){
  const h=document.documentElement, d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('themeBtn').textContent=d?'☀️':'🌙';
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function apiFetch(params){
  const url = API + '&' + params;

  // Try direct first — works on GitHub Pages with no issues
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(12000)});
    if(r.ok){
      const j = await r.json();
      if(j.status !== undefined) return j;
    }
  } catch(e){}

  // Fallback: CORS proxy (for opening file locally)
  const r = await fetch(CORS(url), {signal:AbortSignal.timeout(18000)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const data = await r.json();
  if(data.status !== undefined) return data;
  if(data.contents) return JSON.parse(data.contents);
  throw new Error('No response');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
async function doSearch(){
  if(busy) return;
  const raw = document.getElementById('searchInput').value.trim();
  if(!raw){showToast('Paste a wallet address first');return;}
  if(!raw.startsWith('0x')||raw.length!==42){
    showToast('Address must start with 0x and be 42 characters');return;
  }

  curAddr = raw.toLowerCase();
  busy    = true;
  const btn = document.getElementById('searchBtn');
  btn.disabled=true; btn.textContent='Searching…';

  document.getElementById('results').style.display='block';
  document.getElementById('txBody').innerHTML='<div class="loading"><div class="loader"></div><br>Fetching transactions…</div>';
  renderWalletCard(curAddr, null, null);
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});

  try {
    // Fetch transactions + balance in parallel
    const [txRes, balRes] = await Promise.all([
      apiFetch(`module=account&action=txlist&address=${curAddr}&startblock=0&endblock=99999999&page=1&offset=50&sort=desc`),
      apiFetch(`module=account&action=balance&address=${curAddr}&tag=latest`)
    ]);

    const txs = (txRes.status==='1') ? (txRes.result||[]) : [];
    const bal = (balRes.status==='1') ? (parseFloat(balRes.result)/1e18).toFixed(4)+' ETH' : '—';
    const nonce = txs.filter(t=>t.from.toLowerCase()===curAddr).length;

    txCache = txs;
    renderWalletCard(curAddr, bal, txs.length);
    renderTx(txs);

  } catch(e){
    document.getElementById('txBody').innerHTML=`
      <div class="empty">
        Could not load transactions.<br>
        <span style="font-size:11px;color:var(--txt3)">${e.message}</span><br><br>
        <span style="font-size:11px">Try refreshing or check the address is correct.</span>
      </div>`;
  }

  busy=false; btn.disabled=false; btn.textContent='Search';
}

// ─── RENDER WALLET CARD ───────────────────────────────────────────────────────
function renderWalletCard(addr, bal, txCount){
  const initials = addr.length>=4 ? addr[2].toUpperCase()+addr[3].toUpperCase() : '0X';
  document.getElementById('walletCard').innerHTML=`
    <div class="wc-top">
      <div class="wc-av">${initials}</div>
      <div style="min-width:0">
        <div class="wc-addr">${addr}</div>
        <div class="wc-sub">Ethereum Mainnet</div>
      </div>
    </div>
    <div class="wc-stats">
      <div class="wc-stat">
        <div class="wc-lbl">ETH Balance</div>
        <div class="wc-val c-eth">${bal!==null?bal:'—'}</div>
      </div>
      <div class="wc-stat">
        <div class="wc-lbl">Transactions</div>
        <div class="wc-val cg">${txCount!==null?txCount.toLocaleString():'—'}</div>
      </div>
      <div class="wc-stat">
        <div class="wc-lbl">View on</div>
        <div class="wc-val" style="font-size:14px">
          <a href="https://etherscan.io/address/${addr}" target="_blank" style="color:var(--blue);font-weight:700;text-decoration:none">Etherscan →</a>
        </div>
      </div>
    </div>`;
}

// ─── RENDER TRANSACTIONS ──────────────────────────────────────────────────────
function renderTx(txs){
  const el = document.getElementById('txBody');
  if(!txs.length){
    el.innerHTML='<div class="empty">No transactions found for this address.</div>';
    return;
  }

  const rows = txs.slice(0,25).map(tx=>{
    const fromA = (tx.from||'').toLowerCase();
    const toA   = (tx.to||'').toLowerCase();
    const isIn  = toA===curAddr;
    const isSelf= fromA===toA;
    const val   = parseFloat(tx.value||0)/1e18;
    const valStr= val>0 ? val.toFixed(4)+' ETH' : '—';
    const dir   = isSelf?'SELF':isIn?'IN':'OUT';
    const dCls  = isSelf?'b-self':isIn?'b-in':'b-out';
    const vCls  = isSelf?'val-self':isIn?'val-in':'val-out';
    const ok    = tx.isError==='0';
    const ts    = parseInt(tx.timeStamp||0)*1000;
    const fc    = tx.from&&tx.from.length>2?tx.from[2].toUpperCase():'?';
    const tc    = tx.to&&tx.to.length>2?tx.to[2].toUpperCase():'?';

    return `<tr onclick="showDetail('${tx.hash}')">
      <td><span class="mono hl">${sh(tx.hash,8,6)}</span></td>
      <td>
        <div class="ar">
          <span class="av" style="background:${color(tx.from)}">${fc}</span>
          <span class="at">${sh(tx.from,6,4)}</span>
          <span class="arw">→</span>
          ${tx.to
            ?`<span class="av" style="background:${color(tx.to)}">${tc}</span><span class="at">${sh(tx.to,6,4)}</span>`
            :`<span style="color:var(--txt3);font-size:11px">Contract</span>`}
        </div>
      </td>
      <td><span class="badge ${dCls}">${dir}</span></td>
      <td class="${vCls} mono" style="font-size:11px">${valStr}</td>
      <td><span class="badge ${ok?'b-ok':'b-fail'}">${ok?'✓':'✗'}</span></td>
      <td style="color:var(--txt3);font-size:11px;white-space:nowrap">${ago(ts)}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div style="overflow-x:auto">
    <table class="tbl">
      <thead><tr><th>Hash</th><th>From → To</th><th>Dir</th><th>Value</th><th>Status</th><th>Age</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    ${txs.length>=25?`
    <div class="view-more">
      <span>${txs.length>=50?'Showing latest 50 transactions':'All '+txs.length+' transactions'}</span>
      <a href="https://etherscan.io/address/${curAddr}" target="_blank">View all on Etherscan →</a>
    </div>`:''}
  `;
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────
function showDetail(hash){
  const tx = txCache.find(t=>t.hash===hash);
  if(!tx) return;

  const isIn = (tx.to||'').toLowerCase()===curAddr;
  const val  = (parseFloat(tx.value||0)/1e18).toFixed(6);
  const fee  = (tx.gasUsed&&tx.gasPrice)
    ?(parseInt(tx.gasUsed)*parseInt(tx.gasPrice)/1e18).toFixed(8):'—';
  const ts   = parseInt(tx.timeStamp||0)*1000;
  const ok   = tx.isError==='0';

  document.getElementById('ov').classList.add('show');
  document.getElementById('panel').classList.add('open');

  document.getElementById('panelBody').innerHTML=`
    <div class="dr"><div class="dk">Transaction Hash</div><div class="dv m" style="color:var(--blue)">${hash}</div></div>
    <div class="dr"><div class="dk">Status</div><div class="dv"><span class="badge ${ok?'b-ok':'b-fail'}">${ok?'✓ Success':'✗ Failed'}</span></div></div>
    <div class="dr"><div class="dk">Block</div><div class="dv" style="font-weight:600">${parseInt(tx.blockNumber||0).toLocaleString()}</div></div>
    <div class="dr"><div class="dk">Date & Time</div><div class="dv">${new Date(ts).toLocaleString()} (${ago(ts)})</div></div>
    <div class="dr"><div class="dk">From</div><div class="dv m" style="color:var(--blue)">${tx.from||'—'}</div></div>
    <div class="dr"><div class="dk">To</div><div class="dv m">${tx.to||'Contract Creation'}</div></div>
    <div class="dr">
      <div class="dk">Value</div>
      <div class="dv" style="font-weight:800;font-size:17px;color:${isIn?'var(--green)':'var(--red)'}">
        ${isIn?'+':'-'}${val} ETH
      </div>
    </div>
    <div class="dr"><div class="dk">Transaction Fee</div><div class="dv m">${fee} ETH</div></div>
    <div class="dr"><div class="dk">Gas Used / Limit</div><div class="dv">${parseInt(tx.gasUsed||0).toLocaleString()} / ${parseInt(tx.gas||0).toLocaleString()}</div></div>
    ${tx.functionName?`<div class="dr"><div class="dk">Function</div><div class="dv m" style="color:var(--blue)">${tx.functionName.split('(')[0]}</div></div>`:''}
    <div class="dr">
      <div class="dk">View on Etherscan</div>
      <div class="dv"><a href="https://etherscan.io/tx/${hash}" target="_blank" style="color:var(--blue);font-weight:600">Open full details →</a></div>
    </div>
  `;
}

function closePanel(){
  document.getElementById('ov').classList.remove('show');
  document.getElementById('panel').classList.remove('open');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function sh(h,a=8,b=6){if(!h)return'—';if(h.length<=a+b+3)return h;return h.slice(0,a)+'…'+h.slice(-b);}
function ago(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)      return d+'s ago';
  if(d<3600)    return Math.floor(d/60)+'m ago';
  if(d<86400)   return Math.floor(d/3600)+'h ago';
  if(d<2592000) return Math.floor(d/86400)+'d ago';
  return new Date(ts).toLocaleDateString();
}
function color(a){
  if(!a)return'#5b8ff9';
  const p=['#627eea','#3ecf8e','#f5a623','#9b7ef8','#f25f5c','#06b6d4','#f97316','#ec4899'];
  return p[parseInt((a+'00').slice(2,4),16)%p.length];
}
function showToast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3500);
}

document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
